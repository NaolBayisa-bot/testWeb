<div
  class="relative min-h-[400px] bg-black bg-cover bg-center bg-no-repeat bg-grid-pattern"
  style="background-image: url('assets/bg_portfolio.svg');"
>
  <!-- Gradient overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-black/90 z-10"></div>
  
  <!-- Content -->
  <div class="relative max-w-7xl mx-auto px-4 md:px-8 pt-6 z-20">

    <!-- Header -->
  <app-nav></app-nav>

    <!-- Main Content -->
   <main
  class="max-w-7xl mx-auto mt-12 md:mt-16 flex flex-col md:flex-row
         items-center md:justify-between gap-6 md:gap-8 text-white"
>
  <!-- Portfolio Text -->
  <div>
    <span class="inline-block px-3 py-1 text-xs font-semibold text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 rounded-full mb-3">
      Portfolio
    </span>
    <div class="text-2xl md:text-[28px] font-bold text-white">
      Our Portfolio
    </div>
  </div>

  <!-- Buttons -->
  <div class="flex items-center justify-center gap-3 md:gap-4 flex-wrap">
    <button
      (click)="selectTab('client')"
      [ngClass]="activeTab === 'client' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/10'"
      class="px-6 md:px-10 py-2.5 md:py-3 rounded-xl text-sm md:text-base font-semibold
             transition-all duration-300 whitespace-nowrap"
    >
      Client Portfolios
    </button>

    <button
      (click)="selectTab('projects')"
      [ngClass]="activeTab === 'projects' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/10'"
      class="px-6 md:px-10 py-2.5 md:py-3 rounded-xl text-sm md:text-base font-semibold
             transition-all duration-300 whitespace-nowrap"
    >
      Our Projects
    </button>
  </div>
</main>


  </div>
</div>
