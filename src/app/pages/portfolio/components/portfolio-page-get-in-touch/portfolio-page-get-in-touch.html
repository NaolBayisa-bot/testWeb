<section
  class="relative w-full min-h-[420px] bg-black flex items-center bg-grid-pattern"
  style="background-image: url('assets/bg_portfoliopage_contact.svg'); background-size: cover; background-position: center;"
>
  <!-- Gradient overlay -->
  <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/60 to-transparent z-10"></div>

  <!-- Content -->
  <div class="relative z-10 px-4 sm:px-6 md:px-12 lg:px-16">
    <div class="flex flex-col gap-8 max-w-2xl">
      <span class="inline-block px-3 py-1 text-xs font-semibold text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 rounded-full w-max">
        Get Started
      </span>
      <h1
        class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-white leading-tight"
      >
        Ready to start your
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-green-300">next project?</span>
      </h1>

      <button
        (click)="goToContact()"
        class="w-full sm:w-fit rounded-xl bg-gradient-to-r from-emerald-500 to-green-600 px-8 sm:px-10 py-4
               text-white text-lg font-semibold
               shadow-lg shadow-emerald-500/30
               hover:shadow-emerald-500/50 hover:scale-105 hover:brightness-110
               active:scale-95
               transition-all duration-300"
      >
        Get In Touch
        <svg class="inline-block w-5 h-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </button>
    </div>
  </div>
</section>
