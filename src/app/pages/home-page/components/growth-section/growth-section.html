<section
  class="relative w-full min-h-[420px] sm:min-h-[500px] lg:min-h-[600px] flex items-center"
  style="background-image: url('assets/bg_growth.svg'); background-size: cover; background-position: center; background-size: cover;"
>

  <!-- Content -->
  <div class="relative z-10 w-full px-4 sm:px-6 md:px-12 lg:px-16 py-12 sm:py-16">

    <div class="flex flex-col gap-6 max-w-3xl mx-auto lg:mx-0 text-center lg:text-left">

      <h1
        class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-extrabold text-gray-800 leading-tight"
      >
        Your growth never sleeps,
        <br />
        <span class="text-gray-500 font-semibold">
          and neither do we.
        </span>
      </h1>

      <button
        class="w-full sm:w-fit mx-auto lg:mx-0
               rounded-xl bg-gradient-to-r from-green-500 to-green-600
               px-6 sm:px-8 py-3 sm:py-4
               text-white text-base sm:text-lg font-semibold
               shadow-lg shadow-green-500/30
               hover:shadow-green-600/50
               hover:scale-[1.03]
               active:scale-[0.97]
               transition-all duration-300"
        (click)="scrollToSection('contact')"
      >
        Get In Touch
      </button>

    </div>
  </div>

</section>
