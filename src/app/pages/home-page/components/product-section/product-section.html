<div class="relative bg-black overflow-hidden">
  <!-- Background image (covers both sections) -->
  <div
    class="absolute inset-0 bg-cover bg-center z-0"
    style="background-image: url('assets/bg_product.svg')"
  ></div>

  <!-- Header spotlight -->
  <div
    class="absolute top-0 left-0 w-full h-[420px] md:h-[520px] z-10 pointer-events-none"
    style="
      background: radial-gradient(
        ellipse at 85% 15%,
        rgba(0, 255, 0, 0.18) 0%,
        rgba(0, 0, 0, 0.45) 50%,
        rgba(0, 0, 0, 0.9) 35%
      );
    "
  ></div>

  <!-- PRODUCTS SECTION -->
  <section class="relative z-20 px-4 sm:px-6 md:px-12 lg:px-20 pt-20 md:pt-32 text-white">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-6 md:gap-8 mb-14 md:mb-20">

      <!-- Section Title -->
      <h2 class="text-2xl sm:text-3xl md:text-[42px] font-semibold leading-snug text-center md:text-left">
        Products
      </h2>

      <!-- Description -->
      <div class="md:text-right max-w-full md:max-w-md">
        <h3
          class="text-lg sm:text-2xl md:text-[30px] font-semibold mb-3 text-[#b7c6b7] leading-snug text-center md:text-right"
        >
          Check Out Our Products
        </h3>

        <p class="text-[#b7c6b7] text-sm sm:text-base md:text-lg leading-relaxed text-center md:text-left">
          ALET Technologies delivers enterprise-grade IT and telecom services, including bulk SMS
          solutions, call center management, and SaaS solutions.
        </p>
      </div>
    </div>

    <!-- Outer Container -->
    <div
      class="relative bg-[#2b3f2b] border border-[#4cc64c] rounded-[20px] md:rounded-[26px] px-4 sm:px-6 md:px-10 py-8 md:py-12"
    >

      <!-- FEATURED -->
      <span
        class="absolute -top-3 left-4 md:-top-4 md:left-6 bg-[#49b749] text-white text-xs sm:text-sm px-4 sm:px-6 py-1 rounded-full shadow-md"
      >
        Featured
      </span>

      <!-- Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8">

        <!-- CARD 1 -->
        <div class="bg-[#fbfff8] rounded-[16px] md:rounded-[18px] px-6 md:px-8 py-8 md:py-10 border border-[#9ef09e] text-center sm:text-left">
          <div class="mb-6 flex justify-center sm:justify-start">
            <img src="assets/onevaslogo.svg" alt="OneVAS Logo" class="h-8 sm:h-10 w-auto object-contain">
          </div>

          <p class="text-[#7a8a7a] mb-8 text-sm sm:text-base">
            VAS Management Platform
          </p>

          <button
            class="inline-flex items-center justify-center sm:justify-start border border-[#76D255] text-[#76D255] font-semibold rounded-lg px-5 sm:px-6 py-2.5 sm:py-3 text-sm sm:text-lg w-max whitespace-nowrap hover:bg-[#D7F0CA] transition duration-300"
            routerLink="/one-vas"
            routerLinkActive="true"
          >
            Learn more
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="ml-3 w-5 h-5 sm:w-6 sm:h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="#76D255"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 19L19 5M19 5h-6M19 5v6" />
            </svg>
          </button>
        </div>

        <!-- CARD 2 -->
        <div class="bg-[#fbfff8] rounded-[16px] md:rounded-[18px] px-6 md:px-8 py-8 md:py-10 border border-[#9ef09e] text-center sm:text-left">
          <div class="mb-6 flex justify-center sm:justify-start">
            <img src="assets/smspagelogo.svg" alt="SMS Logo" class="h-8 sm:h-10 w-auto object-contain">
          </div>

          <p class="text-[#7a8a7a] mb-8 text-sm sm:text-base">
            SMS Ethiopia
          </p>

          <button
            class="inline-flex items-center justify-center sm:justify-start border border-[#76D255] text-[#76D255] font-semibold rounded-lg px-5 sm:px-6 py-2.5 sm:py-3 text-sm sm:text-lg w-max whitespace-nowrap hover:bg-[#D7F0CA] transition duration-300"
            routerLink="/sms-ethiopia"
            routerLinkActive="true"
          >
            Learn more
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="ml-3 w-5 h-5 sm:w-6 sm:h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="#76D255"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 19L19 5M19 5h-6M19 5v6" />
            </svg>
          </button>
        </div>

        <!-- CARD 3 -->
        <div class="bg-[#fbfff8] rounded-[16px] md:rounded-[18px] px-6 md:px-8 py-8 md:py-10 border border-[#9ef09e] text-center sm:text-left">
          <div class="mb-6 flex justify-center sm:justify-start">
            <img src="assets/telepagelogo.svg" alt="Tele Logo" class="h-8 sm:h-10 w-auto object-contain">
          </div>

          <p class="text-[#7a8a7a] mb-8 text-sm sm:text-base">
            transportation management
          </p>

          <button
            class="inline-flex items-center justify-center sm:justify-start border border-[#76D255] text-[#76D255] font-semibold rounded-lg px-5 sm:px-6 py-2.5 sm:py-3 text-sm sm:text-lg w-max whitespace-nowrap hover:bg-[#D7F0CA] transition duration-300"
            routerLink="/tele-bus"
            routerLinkActive="true"
          >
            Learn more
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="ml-3 w-5 h-5 sm:w-6 sm:h-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="#76D255"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M5 19L19 5M19 5h-6M19 5v6" />
            </svg>
          </button>
        </div>

      </div>
    </div>
  </section>
</div>
