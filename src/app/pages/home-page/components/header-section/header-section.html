<div class="relative min-h-screen bg-black overflow-hidden bg-grid-pattern">

  <!-- Background image -->
  <div
    class="absolute inset-0 bg-cover bg-center z-0"
    style="background-image: url('assets/bg_image.svg'); background-size: 105%;"
  ></div>

  <!-- Gradient overlays -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-black z-10"></div>
  <div class="absolute top-0 left-0 w-1/2 h-full bg-gradient-to-r from-emerald-500/10 to-transparent z-10"></div>

  <!-- Animated green orb -->
  <div class="absolute top-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl animate-pulse z-10"></div>

  <!-- Navigation -->
  <app-nav></app-nav>

  <!-- Main Content -->
  <main class="relative z-20 max-w-7xl mx-auto px-4 md:px-8 pt-24 md:pt-32 pb-16">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-center">

      <!-- Left: Headline + CTA -->
      <div class="lg:col-span-7 space-y-10 text-center lg:text-left">

        <div class="space-y-6">
          <span class="inline-flex items-center gap-2 px-4 py-1.5 text-xs font-bold text-emerald-300 bg-emerald-500/10 border border-emerald-500/30 rounded-full tracking-widest uppercase">
            <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
            Enterprise Technology Partner
          </span>

          <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-extrabold leading-[0.95] tracking-tight">
            <span class="block text-white/90">Powering Ethiopia's</span>
            <span class="block text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-green-400 to-emerald-400 mt-2">
              Digital Future
            </span>
            <span class="block text-white/60 text-3xl sm:text-4xl md:text-5xl lg:text-6xl mt-4 font-bold">
              with Smart Telecom & IT
            </span>
          </h1>
        </div>

        <p class="text-gray-400 text-lg sm:text-xl max-w-xl leading-relaxed mx-auto lg:mx-0">
          <span class="text-white font-bold">ALET</span> Technologies delivers enterprise-grade IT and telecom services, including bulk SMS, call center management, and SaaS solutions.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
          <button
            (click)="scrollToSection('contact')"
            class="group relative inline-flex items-center gap-3 bg-gradient-to-r from-emerald-500 to-green-600
                   px-10 py-4 text-lg font-bold text-white rounded-2xl
                   shadow-xl shadow-emerald-500/30
                   hover:shadow-emerald-500/50 hover:scale-[1.02]
                   active:scale-95 transition-all duration-300 overflow-hidden"
          >
            <span class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
            <span class="relative">Get In Touch</span>
            <svg class="relative w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
          </button>

          <button
            (click)="scrollToSection('portfolio')"
            class="inline-flex items-center gap-2 px-10 py-4 text-lg font-semibold text-white/90
                   rounded-2xl border-2 border-white/20 hover:border-white/40
                   hover:bg-white/10 transition-all duration-300"
          >
            View Our Work
          </button>
        </div>
      </div>

      <!-- Right: Visual Panel -->
      <div class="lg:col-span-5 flex justify-center lg:justify-end">
        <div class="relative w-full max-w-md lg:max-w-none">
          <!-- Decorative frame -->
          <div class="absolute -inset-4 bg-gradient-to-br from-emerald-500/20 to-transparent rounded-[2rem] rotate-3"></div>
          <div class="absolute -inset-4 bg-gradient-to-tr from-emerald-500/10 to-transparent rounded-[2rem] -rotate-3"></div>
          
          <div class="relative glass-dark rounded-3xl p-8 border border-white/10 backdrop-blur-xl bg-grid-pattern">
            <!-- Logo -->
            <div class="relative flex items-center justify-center h-64">
              <div class="absolute inset-0 bg-emerald-500/10 rounded-full blur-3xl animate-pulse"></div>
              <img
                src="assets/icon.svg"
                alt="ALET Technology"
                class="relative h-40 md:h-52 w-auto object-contain animate-slow-spin"
              />
            </div>

            <!-- Floating badges -->
            <div class="relative flex justify-between items-end mt-4 gap-3">
              <div class="flex-1 bg-white/5 rounded-2xl p-4 border border-white/10 text-center">
                <p class="text-2xl font-bold text-emerald-400">340+</p>
                <p class="text-xs text-gray-400 mt-1">Clients</p>
              </div>
              <div class="flex-1 bg-white/5 rounded-2xl p-4 border border-white/10 text-center">
                <p class="text-2xl font-bold text-emerald-400">6+</p>
                <p class="text-xs text-gray-400 mt-1">Services</p>
              </div>
              <div class="flex-1 bg-white/5 rounded-2xl p-4 border border-white/10 text-center">
                <p class="text-2xl font-bold text-emerald-400">99%</p>
                <p class="text-xs text-gray-400 mt-1">Uptime</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Partner Logos Marquee -->
  <footer class="relative z-20 pb-8 md:pb-12">
    <div class="max-w-7xl mx-auto px-4 md:px-8 mb-6">
      <p class="text-center text-xs text-gray-600 uppercase tracking-widest font-medium">Trusted by industry leaders</p>
    </div>
    <div class="overflow-hidden">
      <div class="flex w-max animate-marquee gap-12 md:gap-16 items-center px-8">
        <img src="assets/bussiness-excel.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/africa-insurance.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/addis-learning-center.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/etemari.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/flintstone.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/tele.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/telebirr.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <!-- Duplicate for loop -->
        <img src="assets/bussiness-excel.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/africa-insurance.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/addis-learning-center.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/etemari.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/flintstone.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/tele.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
        <img src="assets/telebirr.svg" class="h-6 md:h-8 opacity-40 hover:opacity-60 transition-all" />
      </div>
    </div>
  </footer>

</div>
