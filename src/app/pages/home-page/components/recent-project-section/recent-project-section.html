<section class="relative py-28 overflow-hidden bg-white">
    <div class="absolute inset-0 bg-gradient-to-b from-white/95 via-white/85 to-white/95"></div>

  <!-- Background asset with subtle overlay -->
  <div
    class="absolute inset-0 bg-cover bg-center"
    [style.background-image]="'url(assets/bg_recent_project.svg)'"
  ></div>
  

  <!-- Decorative blurs -->
  <div class="absolute top-1/3 -left-48 w-[500px] h-[500px] bg-emerald-200/20 rounded-full blur-[160px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 -right-48 w-[400px] h-[400px] bg-green-200/15 rounded-full blur-[130px] pointer-events-none"></div>

  <div class="relative z-10 max-w-[1400px] mx-auto px-6">

    <!-- Header -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 text-xs font-bold text-emerald-700 bg-emerald-500/10 border border-emerald-500/20 rounded-full animate-fade-in-up mb-6">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
        OUR PORTFOLIO
      </div>
      <h2 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-gray-900 tracking-tight">
        Recent Projects
      </h2>
      <h3 class="text-lg sm:text-xl md:text-2xl font-semibold text-gray-700 mt-3">Let our work speak for itself</h3>
      <p class="mt-4 text-base sm:text-lg text-gray-500 max-w-2xl mx-auto">
        Want to discover what we can do? Take a look at some of the amazing
        projects that have been created by our team of talented designers and developers.
      </p>
    </div>

    <!-- Slider ROW 1 – slides right -->
    <div class="relative overflow-hidden mb-8 rounded-2xl group/slider1">
      <div class="flex animate-slide-right gap-5 py-1">
        <div class="project-card-modern"><img src="assets/image1.svg" alt="Project 1" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image2.svg" alt="Project 2" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image3.svg" alt="Project 3" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/smsrecent.svg" alt="Project 4" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image5.svg" alt="Project 5" class="w-full h-full object-contain" /></div>
        <!-- Duplicate for seamless loop -->
        <div class="project-card-modern"><img src="assets/image1.svg" alt="Project 1" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image2.svg" alt="Project 2" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image3.svg" alt="Project 3" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/smsrecent.svg" alt="Project 4" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image5.svg" alt="Project 5" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image6.svg" alt="Project 6" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image7.svg" alt="Project 7" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image8.svg" alt="Project 8" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image9.svg" alt="Project 9" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image10.png" alt="Project 10" class="w-full h-full object-contain" /></div>
        <!-- Duplicate for seamless loop -->
        <div class="project-card-modern"><img src="assets/image6.svg" alt="Project 6" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image7.svg" alt="Project 7" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image8.svg" alt="Project 8" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image9.svg" alt="Project 9" class="w-full h-full object-contain" /></div>
        <div class="project-card-modern"><img src="assets/image10.png" alt="Project 10" class="w-full h-full object-contain" /></div>

      </div>
    </div>

  

    <!-- CTA -->
    <div class="text-center">
      <button
        class="group relative inline-flex items-center gap-3 bg-gradient-to-r from-emerald-600 to-green-600 text-white font-bold rounded-2xl px-9 py-4 text-lg shadow-xl shadow-emerald-500/25 hover:shadow-emerald-500/40 hover:scale-[1.02] active:scale-95 transition-all duration-300"
        routerLink="portfolio"
      >
        <span class="absolute inset-0 rounded-2xl bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
        <span class="relative inline-flex items-center gap-3">
          See More
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:translate-x-1 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </span>
      </button>
    </div>

  </div>
</section>
