<div class="relative min-h-screen bg-black text-white overflow-x-hidden bg-grid-pattern">

  <!-- Background image -->
  <div
    class="absolute inset-0 bg-cover bg-center md:bg-fixed bg-scroll z-0"
    style="background-image: url('assets/bg_image_why.svg');"
  ></div>

  <!-- Gradient overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/90 via-black/70 to-black/90 z-10"></div>

  <!-- Main Content -->
  <main class="relative z-20 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 py-16 md:py-20">

    <!-- HEADER SECTION -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 md:gap-16 mb-14 md:mb-20">
      <div>
        <span class="inline-block px-3 py-1 text-xs font-semibold text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 rounded-full mb-4">
          FAQ
        </span>
        <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-8">
          Frequently Asked<br>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-green-300">Questions</span>
        </h2>
        <p class="text-gray-400 max-w-md text-base sm:text-lg leading-relaxed">
          Have questions? You are not alone! Here you will find answers to some
          of the most common inquiries about our services, policies, and how to
          get the most out of your experience.
        </p>
      </div>
    </section>

    <!-- FAQ SECTION -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">

      <!-- LEFT COLUMN -->
      <div class="space-y-4">
        <div
          *ngFor="let faq of leftFaqs; let i = index"
          class="rounded-xl bg-white/5 backdrop-blur-md transition-all duration-300 border hover:border-emerald-500/30 active:scale-[0.98]"
          [ngClass]="{
            'border-emerald-500 shadow-lg shadow-emerald-500/20': activeIndex === i,
            'border-white/10': activeIndex !== i
          }"
        >
          <button
            (click)="toggle(i)"
            class="w-full flex items-center justify-between px-6 py-5 text-left"
          >
            <span class="text-base font-medium text-white">
              {{ faq.question }}
            </span>
            <div
              class="flex items-center justify-center w-8 h-8 rounded-full bg-white/5 transition-all duration-300"
              [ngClass]="{ 'bg-emerald-500/20 text-emerald-400 rotate-180': activeIndex === i }"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </button>

          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="activeIndex === i ? '500px' : '0px'"
          >
            <p class="px-6 pb-5 text-sm text-gray-400 leading-relaxed">
              {{ faq.answer }}
            </p>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-4">
        <div
          *ngFor="let faq of rightFaqs; let j = index"
          class="rounded-xl bg-white/5 backdrop-blur-md transition-all duration-300 border hover:border-emerald-500/30 active:scale-[0.98]"
          [ngClass]="{
            'border-emerald-500 shadow-lg shadow-emerald-500/20':
              activeIndex === j + leftFaqs.length,
            'border-white/10':
              activeIndex !== j + leftFaqs.length
          }"
        >
          <button
            (click)="toggle(j + leftFaqs.length)"
            class="w-full flex items-center justify-between px-6 py-5 text-left"
          >
            <span class="text-base font-medium text-white">
              {{ faq.question }}
            </span>
            <div
              class="flex items-center justify-center w-8 h-8 rounded-full bg-white/5 transition-all duration-300"
              [ngClass]="{ 'bg-emerald-500/20 text-emerald-400 rotate-180':
                activeIndex === j + leftFaqs.length
              }"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </button>

          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="activeIndex === j + leftFaqs.length ? '500px' : '0px'"
          >
            <p class="px-6 pb-5 text-sm text-gray-400 leading-relaxed">
              {{ faq.answer }}
            </p>
          </div>
        </div>
      </div>

    </section>

  </main>
</div>
