<div class="relative min-h-screen bg-black text-white overflow-x-hidden">

  <!-- Background image -->
  <div
    class="absolute inset-0 bg-cover bg-center md:bg-fixed bg-scroll z-0"
    style="background-image: url('assets/bg_image_why.svg');"
  ></div>

  <!-- Header spotlight -->
  <div
    class="absolute top-0 left-0 w-full h-32 z-10 pointer-events-none"
    style="background: radial-gradient(circle at 100px 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,1) 100%);"
  ></div>

  <!-- Main Content -->
  <main class="relative z-20 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 py-12 md:py-16">

    <!-- HEADER SECTION -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 md:gap-16 lg:gap-20 mb-14 md:mb-20">

      <div>
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-semibold mb-8 md:mb-12">
          FAQ’S
        </h2>
      </div>

      <div>
        <h3 class="text-xl sm:text-2xl font-semibold mb-3 md:mb-4">
          Let our work speak for itself
        </h3>

        <p class="text-gray-400 max-w-md text-sm sm:text-base">
          Have questions? You are not alone! Here you will find answers to some
          of the most common inquiries about our services, policies, and how to
          get the most out of your experience.
        </p>
      </div>

    </section>

    <!-- FAQ SECTION -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 lg:gap-20">

      <!-- LEFT COLUMN -->
      <div class="space-y-5">
        <div
          *ngFor="let faq of leftFaqs; let i = index"
          class="rounded-xl bg-black/70 backdrop-blur-md transition-all duration-300 border hover:border-[#1AFF00]/50 active:scale-[0.98]"
          [ngClass]="{
            'border-[#1AFF00] shadow-[0_0_20px_rgba(26,255,0,0.25)]': activeIndex === i,
            'border-transparent': activeIndex !== i
          }"
        >
          <button
            (click)="toggle(i)"
            class="w-full flex items-center justify-between px-4 sm:px-6 py-4 sm:py-5 text-left"
          >
            <span class="text-base sm:text-lg font-medium text-white">
              {{ faq.question }}
            </span>

            <div
              class="flex flex-col items-center -space-y-2 transition-transform duration-300"
              [ngClass]="{ 'rotate-180 text-[#1AFF00]': activeIndex === i }"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>

          </button>

          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="activeIndex === i ? '500px' : '0px'"
          >
            <p class="px-4 sm:px-6 pb-4 sm:pb-5 text-sm sm:text-base text-gray-400 leading-relaxed">
              {{ faq.answer }}
            </p>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-5">
        <div
          *ngFor="let faq of rightFaqs; let j = index"
          class="rounded-xl bg-black/70 backdrop-blur-md transition-all duration-300 border hover:border-[#1AFF00]/50 active:scale-[0.98]"
          [ngClass]="{
            'border-[#1AFF00] shadow-[0_0_20px_rgba(26,255,0,0.25)]':
              activeIndex === j + leftFaqs.length,
            'border-transparent':
              activeIndex !== j + leftFaqs.length
          }"
        >
          <button
            (click)="toggle(j + leftFaqs.length)"
            class="w-full flex items-center justify-between px-4 sm:px-6 py-4 sm:py-5 text-left"
          >
            <span class="text-base sm:text-lg font-medium text-white">
              {{ faq.question }}
            </span>

            <div
              class="flex flex-col items-center -space-y-2 transition-transform duration-300"
              [ngClass]="{
                'rotate-180 text-[#1AFF00]':
                  activeIndex === j + leftFaqs.length
              }"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>

          </button>

          <div
            class="overflow-hidden transition-all duration-500 ease-in-out"
            [style.maxHeight]="activeIndex === j + leftFaqs.length ? '500px' : '0px'"
          >
            <p class="px-4 sm:px-6 pb-4 sm:pb-5 text-sm sm:text-base text-gray-400 leading-relaxed">
              {{ faq.answer }}
            </p>
          </div>
        </div>
      </div>

    </section>

  </main>
</div>
