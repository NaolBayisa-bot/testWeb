<div
  class="relative w-full bg-black bg-center bg-cover bg-no-repeat bg-grid-pattern
         min-h-[140px] sm:min-h-[180px] md:min-h-[240px]"
  [style.background-image]="logoSrc ? 'url(' + logoSrc + ')' : 'url(assets/bg_about_us.svg)'"
>
  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-black/60"></div>
  <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/20 to-black z-10"></div>

  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 md:px-8 py-4 z-20">

    <!-- Navigation -->
    <app-nav></app-nav>

    <!-- Main Content -->
    <main
      class="mt-4 sm:mt-5 md:mt-8
             grid grid-cols-1 md:grid-cols-12
             items-center text-white"
    >

      <!-- Logo -->
      <div class="md:col-span-3 flex justify-center md:justify-start">
        <ng-container *ngIf="logoSrc; else textLogo">
          <img
            [src]="logoSrc"
            [alt]="logoAlt"
            class="h-12 sm:h-14 md:h-16 w-auto drop-shadow-2xl"
          />
        </ng-container>

        <ng-template #textLogo>
          <div class="text-xl sm:text-2xl md:text-3xl font-bold" style="font-family: 'Space Grotesk', sans-serif;">
            {{ logoText }}
          </div>
        </ng-template>
      </div>

    </main>

  </div>
</div>
