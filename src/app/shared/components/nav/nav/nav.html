<header
  [ngClass]="{
    'bg-black/90 backdrop-blur-md shadow-lg border-b border-white/10 py-3': scrolled,
    'bg-transparent py-5 text-bg-white': !scrolled
  }"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 ease-in-out"
>
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center px-4 md:px-8 max-w-7xl mx-auto w-full relative z-20">

    <!-- Top row: Logo and Desktop Nav -->
    <div class="w-full flex justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center">
        <img src="assets/icon.svg" alt="ALET Technology PLC" class="h-10 md:h-12" />
      </div>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex space-x-8 text-sm font-medium text-white">
        <a (click)="scrollToSection('home')" 
           [class.text-green-500]="isActive('head')" 
           class="hover:text-green-500 transition cursor-pointer">Home</a>
        <a (click)="scrollToSection('about-us')" 
           [class.text-green-500]="isActive('about-us')" 
           class="hover:text-green-500 transition cursor-pointer">About</a>
        <a (click)="scrollToSection('products')" 
           [class.text-green-500]="isActive('products')" 
           class="hover:text-green-500 transition cursor-pointer">Products</a>
        <a (click)="scrollToSection('services')" 
           [class.text-green-500]="isActive('services')" 
           class="hover:text-green-500 transition cursor-pointer">Services</a>
        <a (click)="scrollToSection('why-us'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('why-us')" 
           class="hover:text-green-500 transition cursor-pointer">Why us</a>
        <a (click)="scrollToSection('portfolio')" 
           [class.text-green-500]="isActive('portfolio')" 
           class="hover:text-green-500 transition">Portfolio</a>
      </nav>

      <!-- Get In Touch Button (Desktop) -->
      <button
        (click)="scrollToSection('contact')"
        class="hidden md:inline-block bg-green-500 px-6 md:px-8 py-2
               text-base md:text-lg font-semibold
               rounded-md shadow-lg hover:shadow-gray-400/70
               text-white hover:scale-[1.02]
               active:scale-[0.98] transition-all duration-300"
      >      
        Get In Touch
      </button>
      

      <!-- Mobile Hamburger -->
      <button class="md:hidden flex items-center" (click)="toggleMobileMenu()">
        <svg *ngIf="!mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg *ngIf="mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="mobileMenuOpen" class="w-full bg-gray-900 text-white md:hidden shadow-lg mt-4">
      <nav class="flex flex-col space-y-4 px-4 py-6 text-base font-medium">
        <a (click)="scrollToSection('head'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('head')" 
           class="hover:text-green-500 transition cursor-pointer">Home</a>
        <a (click)="scrollToSection('about-us'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('about-us')" 
           class="hover:text-green-500 transition cursor-pointer">About</a>
        <a (click)="scrollToSection('products'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('products')" 
           class="hover:text-green-500 transition cursor-pointer">Products</a>
        <a (click)="scrollToSection('services'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('services')" 
           class="hover:text-green-500 transition cursor-pointer">Services</a>
        <a (click)="scrollToSection('why-us'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('why-us')" 
           class="hover:text-green-500 transition cursor-pointer">Why us</a>
        <a (click)="scrollToSection('portfolio'); toggleMobileMenu()" 
           [class.text-green-500]="isActive('portfolio')" 
           class="hover:text-green-500 transition cursor-pointer">Portfolio</a>
        <button
          (click)="scrollToSection('contact'); toggleMobileMenu()"
           [class.text-green-500]="isActive('contact')" 
           class="px-6 py-2 rounded-md font-bold shadow-lg hover:shadow-neon transition mt-2 inline-block bg-green-500">
          Get In Touch
        </button>
      </nav>
    </div>

  </div>
</header>
