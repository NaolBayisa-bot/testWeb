      server {
            listen 8080;
            listen [::]:8080;

            # Security headers — applied to all responses
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            # HSTS is only honored over HTTPS; enable after TLS is configured
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

            location / {
                  root /usr/share/nginx/html;
                  index index.html;
                  try_files $uri $uri/ /index.html =404;
      
                  # Content Security Policy — defense-in-depth against XSS
                  add_header Content-Security-Policy "
                  default-src 'self';
                  script-src 'self' https://maps.googleapis.com;
                  style-src 'self' 'unsafe-inline';
                  img-src 'self' data: https://maps.googleapis.com https://maps.gstatic.com https://*.google.com https://*.googleapis.com;
                  font-src 'self';
                  connect-src 'self' https://api.emailjs.com https://maps.googleapis.com https://*.google.com https://*.googleapis.com;
                  frame-src 'self' https://www.google.com https://maps.google.com https://maps.googleapis.com;
                  manifest-src 'self';
                  " always;
            }

            client_max_body_size 1M;
            gzip on;
            gzip_disable "MSIE [1-6]\\.(?!.*SV1)";
            gzip_vary on;
            gzip_types text/plain text/css text/javascript image/svg+xml image/x-icon application/javascript application/x-javascript;


      }
