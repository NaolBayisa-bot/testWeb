server {
      listen 80;
      listen [::]:80;

      location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html =404;

            # Content Security Policy — defense-in-depth against XSS
            add_header Content-Security-Policy "
                default-src 'self';
                script-src 'self' 'unsafe-inline' https://maps.googleapis.com;
                style-src 'self' 'unsafe-inline';
                img-src 'self' data: https://maps.googleapis.com https://maps.gstatic.com https://*.google.com https://*.googleapis.com;
                font-src 'self';
                connect-src 'self' https://api.emailjs.com https://maps.googleapis.com https://*.google.com https://*.googleapis.com;
                frame-src 'self' https://www.google.com https://maps.google.com https://www.google.com/maps https://maps.googleapis.com;
                manifest-src 'self';
            " always;
      }

      client_max_body_size 1M;
      gzip on;
      gzip_disable "MSIE [1-6]\.(?!.*SV1)";
      gzip_vary on;
      gzip_types text/plain text/css text/javascript image/svg+xml image/x-icon application/javascript application/x-javascript;


}
